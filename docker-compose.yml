services:
  # ── API Server (with Flutter + Android + Capacitor SDKs) ─────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.sdk
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: "postgresql://ide:${POSTGRES_PASSWORD:-idepassword}@postgres:5432/cloud_ide"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET:-change_me_generate_with_openssl_rand_hex_32}"
      SESSION_SECRET: "${SESSION_SECRET:-change_me_generate_with_openssl_rand_hex_32}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # SDK paths (pre-installed in Dockerfile.sdk)
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      FLUTTER_ROOT: /opt/flutter
      CAPACITOR_TEMPLATE_DIR: /opt/capacitor-template
      PATH: "/opt/flutter/bin:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools:/usr/lib/jvm/java-17-openjdk-amd64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    volumes:
      - apk_storage:/tmp/apk_builds
      - api_logs:/app/logs
      # Optional: mount pre-built Gradle cache to speed up builds
      - gradle_cache:/root/.gradle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend (Vite/React) ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    depends_on:
      - api

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cloud_ide
      POSTGRES_USER: ide
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-idepassword}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ide -d cloud_ide"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  apk_storage:
  api_logs:
  gradle_cache:

# ─────────────────────────────────────────────────────────────────────────────
# Quick-start:
#   cp .env.example .env          # fill in required secrets
#   docker compose up -d          # starts all services
#   docker compose exec api node -e "require('./dist/index.mjs')" # verify
#
# Apply DB schema (first run):
#   docker compose exec api sh -c "cd /app && node dist/index.mjs --migrate"
#   # or from host with DATABASE_URL set:
#   pnpm --filter @workspace/db run push
#
# View logs:
#   docker compose logs -f api
#
# Build types supported when using Dockerfile.sdk:
#   - Flutter    → APK  (flutter build apk --debug)
#   - Android    → APK  (Gradle assembleDebug)
#   - HTML/JS/TS → APK  (Capacitor + Gradle)
#   - React Native → Live preview (Expo Snack) + APK via Gradle
# ─────────────────────────────────────────────────────────────────────────────
