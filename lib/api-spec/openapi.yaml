openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: builds
  - name: execution
  - name: projects

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /run:
    post:
      operationId: runCode
      tags: [execution]
      summary: Execute code (buffered JSON response)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /run/stream:
    post:
      operationId: runCodeStream
      tags: [execution]
      summary: Execute code with real-time SSE streaming output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
      responses:
        "200":
          description: Server-Sent Events stream of execution output
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /build:
    post:
      operationId: startBuild
      tags: [builds]
      summary: Start a Flutter APK build (ZIP upload)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                project:
                  type: string
                  format: binary
              required:
                - project
      responses:
        "200":
          description: Build queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /build/project:
    post:
      operationId: buildProject
      tags: [builds]
      summary: Build or preview from file map (react-native, flutter, android)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectBuildRequest"
      responses:
        "200":
          description: Build started or preview ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectBuildResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /status/{jobId}:
    get:
      operationId: getBuildStatus
      tags: [builds]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /download/{jobId}:
    get:
      operationId: downloadApk
      tags: [builds]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: APK binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /logs/{jobId}:
    get:
      operationId: getBuildLogs
      tags: [builds]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Build logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildLogs"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List user's saved projects
      parameters:
        - name: x-user-key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          description: Missing user key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createProject
      tags: [projects]
      summary: Save a new project
      parameters:
        - name: x-user-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-user-key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateProject
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-user-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteProject
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-user-key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  id:
                    type: string
                required: [success, id]
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/share:
    post:
      operationId: shareProject
      tags: [projects]
      summary: Generate a public share link for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: x-user-key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Share link created or reused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareResponse"
        "401":
          description: Missing user key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /share/{shareId}:
    get:
      operationId: getSharedProject
      tags: [projects]
      summary: Load a publicly shared project (no auth required)
      parameters:
        - name: shareId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared project data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedProjectResponse"
        "404":
          description: Share link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    RunRequest:
      type: object
      properties:
        language:
          type: string
        code:
          type: string
        filename:
          type: string
      required: [language, code]

    RunResult:
      type: object
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exitCode:
          type: integer
        duration:
          type: integer
        error:
          type: string
          nullable: true
        html:
          type: string
          nullable: true
      required: [stdout, stderr, exitCode, duration]

    ProjectBuildRequest:
      type: object
      properties:
        type:
          type: string
          enum: [flutter, react-native, android, ios]
        files:
          type: object
          additionalProperties:
            type: string
        name:
          type: string
      required: [type, files]

    ProjectBuildResponse:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [queued, building, success, failed, preview_ready]
        previewUrl:
          type: string
          nullable: true
        embedUrl:
          type: string
          nullable: true
        qrUrl:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
      required: [jobId, status]

    BuildResponse:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [queued, building, success, failed]
        queuePosition:
          type: integer
      required: [jobId, status]

    JobStatus:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [queued, building, success, failed]
        logs:
          type: string
          nullable: true
        download:
          type: string
          nullable: true
        queuePosition:
          type: integer
          nullable: true
        startedAt:
          type: string
          nullable: true
        completedAt:
          type: string
          nullable: true
        stage:
          type: string
          nullable: true
        previewUrl:
          type: string
          nullable: true
        embedUrl:
          type: string
          nullable: true
        qrUrl:
          type: string
          nullable: true
      required: [jobId, status]

    BuildLogs:
      type: object
      properties:
        jobId:
          type: string
        logs:
          type: string
        stage:
          type: string
          nullable: true
      required: [jobId, logs]

    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        projectType:
          type: string
        files:
          type: object
          additionalProperties:
            type: string
      required: [name, files]

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        projectType:
          type: string
        files:
          type: object
          additionalProperties:
            type: string

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        projectType:
          type: string
        files:
          type: object
          additionalProperties:
            type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, projectType, createdAt, updatedAt]

    ProjectSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        projectType:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, projectType, createdAt, updatedAt]

    ProjectListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSummary"
      required: [projects]

    ProjectResponse:
      type: object
      properties:
        project:
          $ref: "#/components/schemas/Project"
      required: [project]

    ShareResponse:
      type: object
      properties:
        shareUrl:
          type: string
        shareId:
          type: string
        stats:
          $ref: "#/components/schemas/ShareStats"
      required: [shareUrl, shareId, stats]

    ShareStats:
      type: object
      properties:
        totalViews:
          type: integer
        uniqueViews:
          type: integer
        forksCount:
          type: integer
        runsCount:
          type: integer
      required: [totalViews, uniqueViews, forksCount, runsCount]

    SharedProjectResponse:
      type: object
      properties:
        project:
          $ref: "#/components/schemas/Project"
        shareId:
          type: string
        stats:
          $ref: "#/components/schemas/ShareStats"
      required: [project, shareId, stats]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
