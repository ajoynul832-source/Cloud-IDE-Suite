openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: builds
    description: Flutter APK build operations
  - name: execution
    description: Code execution engine
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /run:
    post:
      operationId: runCode
      tags: [execution]
      summary: Execute code
      description: Run JavaScript or Python code and return output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResult"
        "400":
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /build:
    post:
      operationId: startBuild
      tags: [builds]
      summary: Start a Flutter APK build (ZIP upload)
      description: Accept a ZIP file of a Flutter project and queue it for APK compilation
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                project:
                  type: string
                  format: binary
                  description: ZIP file of the Flutter project (max 10MB)
              required:
                - project
      responses:
        "200":
          description: Build queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildResponse"
        "400":
          description: Invalid request (not a zip, too large, missing fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /build/project:
    post:
      operationId: buildProject
      tags: [builds]
      summary: Build or preview a project from file map
      description: |
        Build or preview a project given a file map and a build type.
        - react-native → creates an Expo Snack and returns a live preview URL + QR
        - flutter → packages files as ZIP and builds APK
        - android → triggers Android Gradle build
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectBuildRequest"
      responses:
        "200":
          description: Build started or preview ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectBuildResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /status/{jobId}:
    get:
      operationId: getBuildStatus
      tags: [builds]
      summary: Get build status
      description: Returns the current status of a build job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /download/{jobId}:
    get:
      operationId: downloadApk
      tags: [builds]
      summary: Download the compiled APK
      description: Returns the APK file if the build was successful
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: APK file binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Job not found or build not successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /logs/{jobId}:
    get:
      operationId: getBuildLogs
      tags: [builds]
      summary: Get build logs
      description: Returns stdout/stderr logs for a build job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Build logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildLogs"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RunRequest:
      type: object
      properties:
        language:
          type: string
          description: "Programming language: javascript, python, typescript, html"
        code:
          type: string
          description: Source code to execute
        filename:
          type: string
          description: Optional filename hint for language detection
      required:
        - language
        - code

    RunResult:
      type: object
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exitCode:
          type: integer
        duration:
          type: integer
          description: Execution time in milliseconds
        error:
          type: string
          nullable: true
      required:
        - stdout
        - stderr
        - exitCode
        - duration

    ProjectBuildRequest:
      type: object
      properties:
        type:
          type: string
          enum: [flutter, react-native, android, ios]
          description: Project/build type
        files:
          type: object
          additionalProperties:
            type: string
          description: Map of filename to file content
        name:
          type: string
          description: Project name (used for Snack)
      required:
        - type
        - files

    ProjectBuildResponse:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [queued, building, success, failed, preview_ready]
        previewUrl:
          type: string
          nullable: true
          description: Live preview URL (for react-native Expo Snack)
        embedUrl:
          type: string
          nullable: true
          description: Embeddable iframe URL
        qrUrl:
          type: string
          nullable: true
          description: QR code image URL for opening on device
        message:
          type: string
          nullable: true
          description: Status or error message
      required:
        - jobId
        - status

    BuildResponse:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [queued, building, success, failed]
        queuePosition:
          type: integer
          description: Position in queue (0 = currently building)
      required:
        - jobId
        - status

    JobStatus:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [queued, building, success, failed]
        logs:
          type: string
          nullable: true
        download:
          type: string
          nullable: true
          description: Download URL if build succeeded
        queuePosition:
          type: integer
          nullable: true
        startedAt:
          type: string
          nullable: true
        completedAt:
          type: string
          nullable: true
        stage:
          type: string
          nullable: true
          description: Current build stage (extracting, validating, getting deps, building apk)
      required:
        - jobId
        - status

    BuildLogs:
      type: object
      properties:
        jobId:
          type: string
        logs:
          type: string
        stage:
          type: string
          nullable: true
      required:
        - jobId
        - logs

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
